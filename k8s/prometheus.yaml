apiVersion: v1
kind: ConfigMap
metadata:
    name: prometheus-config
    namespace: monitoring
data:
    prometheus.yml: |
        global:
          scrape_interval: 5s
          
        scrape_configs:
            - job_name: 'kubernetes'
              static_configs:
                  - targets: ['go-web-app-service.default.svc.cluster.local:80']

---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: prometheus
    namespace: monitoring
spec:
    replicas: 1
    selector:
        matchLabels:
            app: prometheus
    template:
        metadata:
            labels:
                app: prometheus
        spec:
            containers:
                -   name: prometheus
                    image: prom/prometheus
                    args:
                        - "--config.file=/etc/prometheus/prometheus.yml"
                    ports:
                        -   containerPort: 9090
                    volumeMounts:
                        - name: config
                          mountPath: /etc/prometheus
            volumes:
                -   name: config
                    configMap:
                        name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
    name: prometheus
    namespace: monitoring
spec:
    type: NodePort
    selector:
        app: prometheus
    ports:
        -   port: 9090
            targetPort: 9090
            nodePort: 30090
